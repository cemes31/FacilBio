    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;

  .modal {

    border-radius: 16px;

    font-size: 1.1rem;
    color: var(--vert-fonce);

  .modal-close {

    color: #999; line-height: 1;

  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--gris-clair);
    display: flex;
    gap: 10px;
    justify-content: flex-end;

    height: 10px;

    align-items: center;

  }
  .fertil-autorise { background: #e8f5e9; color: #2e7d32; }
  .fertil-conditionnel { background: #fff8e1; color: #e65100; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3d 60%, #4a8c5c 100%);

  .pwd-footer { margin-top: 20px; font-size: 0.75rem; color: #aaa; }
  /* BANDEAU DÉMO */
  .demo-banner {

  .sidebar { top: 38px !important; height: calc(100vh - 38px) !important; }
  .topbar { top: 38px !important; }
  .main { padding-top: 38px; }
</style>

function Dashboard({ parcelles, interventions, certif, docsAudit }) {

  const prochainAudit = new Date(certif.date_prochain_audit);
  const joursAudit = Math.ceil((prochainAudit - today) / (1000*60*60*24));

  const parcellesEnConversion = parcelles.filter(p => p.statut === "conversion");

  // Calcul de la fin de conversion (2 ans) pour chaque parcelle en conversion
  const getFinConversionInfo = (debut) => {
    const d = new Date(debut);
    d.setFullYear(d.getFullYear() + 2);
    const moisRestants = Math.round((d - today) / (1000*60*60*24*30));
    return { date: d, moisRestants };

  return (
    <div>

        <div className="stat-card">

          <div className="stat-sub">✓ En production bio</div>
        </div>
        <div className="stat-card orange">
          <div className="stat-emoji">⏳</div>
          <div className="stat-val">{surfaceConv.toFixed(1)} ha</div>
          <div className="stat-label">En conversion</div>
          <div className="stat-sub">2 parcelles concernées</div>
        </div>
        <div className="stat-card terre">
          <div className="stat-emoji">🧪</div>
          <div className="stat-val">{interventions.length}</div>
          <div className="stat-label">Interventions 2025</div>
          <div className="stat-sub">Toutes produits AB</div>
        </div>
        <div className="stat-card alert">
          <div className="stat-emoji">📋</div>
          <div className="stat-val">{joursAudit}j</div>
          <div className="stat-label">Avant prochain audit</div>
          <div className="stat-sub">{certif.organisme} – {new Date(certif.date_prochain_audit).toLocaleDateString('fr-FR', {month:'long', year:'numeric'})}</div>
        </div>
      </div>

      <div className="dash-grid">
        <div className="card">
          <div className="card-header">
            <div className="card-title">🌱 Dernières interventions</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Parcelle</th>
                <th>Produit</th>
                <th>Objectif</th>
              </tr>
            </thead>
            <tbody>
              {interventions.slice(-5).reverse().map(i => (
                <tr key={i.id}>
                  <td>{new Date(i.date).toLocaleDateString('fr-FR')}</td>
                  <td>{i.parcelle}</td>
                  <td><span className="badge badge-ab">🌿 {i.produit}</span></td>
                  <td style={{color:'#666', fontSize:'0.8rem'}}>{i.objectif}</td>
                </tr>
              ))}
              {interventions.length === 0 && (
                <tr><td colSpan="4"><div className="empty-state"><div className="empty-icon">📝</div><div className="empty-text">Aucune intervention enregistrée</div></div></td></tr>
              )}
            </tbody>
          </table>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
          <div className="card">
            <div className="card-header">
              <div className="card-title">⚠️ Alertes</div>
            </div>
            <div className="card-body">
              <div className="alert-item">
                <div className={`alert-dot ${joursAudit < 30 ? 'rouge' : joursAudit < 90 ? 'orange' : 'vert'}`}></div>
                <div>
                  <div className="alert-text">

// ===================== PARCELLES =====================
function Parcelles({ parcelles, setParcelles }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ nom:'', surface:'', culture:'', statut:'certifie', debut_conversion:'', organisme:'Ecocert' });

  const getProgression = (debut) => {
    const d = new Date(debut);
    const now = new Date();
    const mois = Math.floor((now - d) / (1000*60*60*24*30));
    const duree = 24; // 2 ans grandes cultures
    return Math.min(100, Math.round(mois/duree*100));
  };

  const getFinConversion = (debut) => {
    const d = new Date(debut);
    d.setFullYear(d.getFullYear() + 2);
    return d.toLocaleDateString('fr-FR', {month:'long', year:'numeric'});
  };

  const ajouter = () => {
    if (!form.nom || !form.surface) return;
    setParcelles([...parcelles, { ...form, id: Date.now(), surface: parseFloat(form.surface) }]);
    setModal(false);
    setForm({ nom:'', surface:'', culture:'', statut:'certifie', debut_conversion:'', organisme:'Ecocert' });
  };

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div className="card-title">🗺️ Mes parcelles ({parcelles.length})</div>
          <button className="btn btn-primary" onClick={() => setModal(true)}>+ Ajouter parcelle</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Parcelle</th>
              <th>Culture</th>
              <th>Surface</th>
              <th>Statut</th>
              <th>Organisme</th>
              <th>Progression</th>
            </tr>
          </thead>
          <tbody>
            {parcelles.map(p => (
              <tr key={p.id}>
                <td><strong>{p.nom}</strong></td>
                <td>{p.culture}</td>
                <td>{p.surface} ha</td>
                <td>
                  {p.statut === 'certifie'
                    ? <span className="badge badge-ab">✅ Certifié AB</span>
                    : <span className="badge badge-conv">⏳ En conversion</span>}
                </td>
                <td style={{fontSize:'0.82rem',color:'#666'}}>{p.organisme}</td>
                <td style={{minWidth:'160px'}}>
                  {p.statut === 'conversion' ? (
                    <div>
                      <div className="conv-bar-wrap">
                        <div className="conv-bar" style={{width:`${getProgression(p.debut_conversion)}%`, background:'linear-gradient(90deg,var(--or),var(--terre-clair))'}}></div>
                      </div>
                      <div style={{fontSize:'0.72rem',color:'#888',marginTop:3}}>
                        {getProgression(p.debut_conversion)}% — certif. {getFinConversion(p.debut_conversion)}
                      </div>
                    </div>
                  ) : <span style={{fontSize:'0.82rem',color:'var(--vert-clair)'}}>✓ Certifié</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {modal && (
        <Modal title="➕ Nouvelle parcelle" onClose={() => setModal(false)}
          footer={<><button className="btn btn-outline" onClick={() => setModal(false)}>Annuler</button><button className="btn btn-primary" onClick={ajouter}>Enregistrer</button></>}>
          <div className="form-grid">
            <div className="form-row">
              <div className="form-group">
                <label>Nom de la parcelle *</label>
                <input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})} placeholder="Ex: Le Grand Pré" />
              </div>
              <div className="form-group">
                <label>Surface (ha) *</label>
                <input type="number" step="0.1" value={form.surface} onChange={e=>setForm({...form,surface:e.target.value})} placeholder="Ex: 3.5" />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Culture principale</label>
                <input value={form.culture} onChange={e=>setForm({...form,culture:e.target.value})} placeholder="Ex: Blé tendre, Maraîchage…" />
              </div>
              <div className="form-group">
                <label>Statut AB</label>
                <select value={form.statut} onChange={e=>setForm({...form,statut:e.target.value})}>
                  <option value="certifie">Certifié AB</option>
                  <option value="conversion">En conversion</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Date de début conversion</label>
                <input type="date" value={form.debut_conversion} onChange={e=>setForm({...form,debut_conversion:e.target.value})} />
              </div>
              <div className="form-group">
                <label>Organisme certificateur</label>
                <select value={form.organisme} onChange={e=>setForm({...form,organisme:e.target.value})}>
                  <option>Ecocert</option>
                  <option>Bureau Veritas</option>
                  <option>Certipaq</option>
                  <option>Afocert</option>
                  <option>Ocacia</option>
                  <option>Autre</option>
                </select>
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function RegistreIntrants({ interventions, setInterventions, parcelles, stock, setStock }) {
  const [modal, setModal] = useState(false);
  const [tab, setTab] = useState('registre');
  const [recherche, setRecherche] = useState('');
  const [editId, setEditId] = useState(null);
  const [confirmSuppr, setConfirmSuppr] = useState(null);
  const [ecoute, setEcoute] = useState(false);
  const formVide = { date:'', parcelle:'', produit:'', dose:'', objectif:'', operateur:'' };
  const [form, setForm] = useState(formVide);

  const produitsFiltres = INTRANTS_AB.filter(p =>
    p.substance.toLowerCase().includes(recherche.toLowerCase()) ||
    p.categorie.toLowerCase().includes(recherche.toLowerCase()) ||
    p.usages.toLowerCase().includes(recherche.toLowerCase())
  );

  const ouvrirAjout = () => {
    setEditId(null);
    setForm(formVide);
    setModal(true);
  };

  const ouvrirEdition = (intervention) => {
    setEditId(intervention.id);
    setForm({
      date: intervention.date, parcelle: intervention.parcelle, produit: intervention.produit,
      dose: intervention.dose, objectif: intervention.objectif, operateur: intervention.operateur
    });
    setModal(true);
  };

  const decrementerStock = (nomProduit, dose) => {
    // Extrait la valeur numérique de la dose (ex: "3 kg/ha" -> 3)
    const match = String(dose).match(/[\d.,]+/);
    if (!match) return;
    const valeur = parseFloat(match[0].replace(',', '.'));
    if (!valeur || isNaN(valeur)) return;
    setStock(prev => prev.map(s =>
      s.produit === nomProduit ? { ...s, quantite: Math.max(0, +(s.quantite - valeur).toFixed(2)) } : s
    ));
  };

  const enregistrer = () => {
    if (!form.date || !form.parcelle || !form.produit) return;
    const parc = parcelles.find(p => p.nom === form.parcelle);
    if (editId) {
      setInterventions(interventions.map(i => i.id === editId ? { ...form, id: editId, culture: parc?.culture || i.culture } : i));
    } else {
      setInterventions([...interventions, { ...form, id: Date.now(), culture: parc?.culture || '' }]);
      decrementerStock(form.produit, form.dose);
    }
    setModal(false);
    setEditId(null);
    setForm(formVide);
  };

  const supprimer = (id) => {
    setInterventions(interventions.filter(i => i.id !== id));
    setConfirmSuppr(null);
  };

  // Dictée vocale pour le champ "objectif"
  const lancerDictee = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("La dictée vocale n'est pas supportée par ce navigateur. Utilisez Chrome ou Edge.");
      return;
    }
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => setEcoute(true);
    recognition.onend = () => setEcoute(false);
    recognition.onerror = () => setEcoute(false);
    recognition.onresult = (event) => {
      const texte = event.results[0][0].transcript;
      setForm(prev => ({ ...prev, objectif: prev.objectif ? prev.objectif + ' ' + texte : texte }));
    };
    recognition.start();
  };

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${tab==='registre'?'active':''}`} onClick={()=>setTab('registre')}>📋 Registre des interventions</button>
        <button className={`tab ${tab==='produits'?'active':''}`} onClick={()=>setTab('produits')}>🌿 Produits autorisés AB</button>
        <button className={`tab ${tab==='fertilisants'?'active':''}`} onClick={()=>setTab('fertilisants')}>🌱 Fertilisants & Amendements</button>
      </div>

      {tab === 'registre' && (
        <div className="card">
          <div className="card-header">
            <div className="card-title">📋 Interventions phytosanitaires AB</div>
            <button className="btn btn-primary" onClick={ouvrirAjout}>+ Nouvelle intervention</button>
          </div>
          <div className="info-box" style={{margin:'0 20px 0', borderRadius:'8px 8px 0 0'}}>
            💡 <strong>Rappel :</strong> En agriculture biologique, seuls les produits listés dans l'Annexe I du règlement UE 2021/1165 et disposant d'une AMM française sont autorisés.
          </div>
          <table>
            <thead>
              <tr><th>Date</th><th>Parcelle</th><th>Culture</th><th>Produit AB utilisé</th><th>Dose</th><th>Objectif</th><th>Opérateur</th><th>Actions</th></tr>
            </thead>
            <tbody>
              {interventions.map(i => (
                <tr key={i.id}>
                  <td>{new Date(i.date).toLocaleDateString('fr-FR')}</td>
                  <td>{i.parcelle}</td>
                  <td style={{fontSize:'0.82rem',color:'#666'}}>{i.culture}</td>
                  <td><span className="badge badge-ab">🌿 {i.produit}</span></td>
                  <td style={{fontSize:'0.82rem'}}>{i.dose}</td>
                  <td style={{fontSize:'0.82rem',color:'#666'}}>{i.objectif}</td>
                  <td style={{fontSize:'0.82rem'}}>{i.operateur}</td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>ouvrirEdition(i)}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>setConfirmSuppr(i.id)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
              {interventions.length === 0 && (
                <tr><td colSpan="8"><div className="empty-state"><div className="empty-icon">🌿</div><div className="empty-text">Aucune intervention enregistrée</div></div></td></tr>
              )}

// ===================== STOCK INTRANTS AB =====================
function StockIntrants({ stock, setStock }) {
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const [confirmSuppr, setConfirmSuppr] = useState(null);
  const formVide = { produit:'', categorie:'Fongicide', quantite:'', unite:'kg', seuil_alerte:'', fournisseur:'', date_achat:'' };
  const [form, setForm] = useState(formVide);

  const ouvrirAjout = () => {
    setEditId(null);
    setForm(formVide);
    setModal(true);
  };

  const ouvrirEdition = (item) => {
    setEditId(item.id);
    setForm({ ...item, quantite: String(item.quantite), seuil_alerte: String(item.seuil_alerte) });
    setModal(true);
  };

  const enregistrer = () => {
    if (!form.produit || form.quantite === '') return;
    const data = { ...form, quantite: parseFloat(form.quantite) || 0, seuil_alerte: parseFloat(form.seuil_alerte) || 0 };
    if (editId) {
      setStock(stock.map(s => s.id === editId ? { ...data, id: editId } : s));
    } else {
      setStock([...stock, { ...data, id: Date.now() }]);
    }
    setModal(false);
    setEditId(null);
    setForm(formVide);
  };

  const supprimer = (id) => {
    setStock(stock.filter(s => s.id !== id));
    setConfirmSuppr(null);
  };

  const ajusterQuantite = (id, delta) => {
    setStock(stock.map(s => s.id === id ? { ...s, quantite: Math.max(0, +(s.quantite + delta).toFixed(2)) } : s));
  };

  const enAlerte = stock.filter(s => s.quantite <= s.seuil_alerte);

  return (
    <div>
      {enAlerte.length > 0 && (
        <div className="info-box" style={{background:'#ffebee', borderColor:'#ffcdd2', color:'#c62828', marginBottom:16}}>
          ⚠️ <strong>{enAlerte.length} produit(s) en stock bas :</strong> {enAlerte.map(s => s.produit).join(', ')}
        </div>
      )}
      <div className="card">
        <div className="card-header">
          <div className="card-title">📦 Stock d'intrants AB</div>
          <button className="btn btn-primary" onClick={ouvrirAjout}>+ Ajouter un produit</button>
        </div>
        <table>
          <thead>
            <tr><th>Produit</th><th>Catégorie</th><th>Quantité</th><th>Seuil alerte</th><th>Fournisseur</th><th>Achat</th><th>Actions</th></tr>
          </thead>
          <tbody>
            {stock.map(s => (
              <tr key={s.id}>
                <td><strong>{s.produit}</strong></td>
                <td style={{fontSize:'0.82rem',color:'#666'}}>{s.categorie}</td>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <button className="btn btn-outline btn-sm" onClick={()=>ajusterQuantite(s.id,-1)}>−</button>
                    <span style={{
                      fontWeight:600,
                      color: s.quantite <= s.seuil_alerte ? 'var(--rouge-bio)' : 'var(--vert-fonce)',
                      minWidth:60, textAlign:'center'
                    }}>{s.quantite} {s.unite}</span>
                    <button className="btn btn-outline btn-sm" onClick={()=>ajusterQuantite(s.id,1)}>+</button>
                  </div>
                </td>
                <td style={{fontSize:'0.82rem',color:'#888'}}>{s.seuil_alerte} {s.unite}</td>
                <td style={{fontSize:'0.82rem',color:'#666'}}>{s.fournisseur}</td>
                <td style={{fontSize:'0.78rem',color:'#888'}}>{s.date_achat ? new Date(s.date_achat).toLocaleDateString('fr-FR') : '—'}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-outline btn-sm" onClick={()=>ouvrirEdition(s)}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>setConfirmSuppr(s.id)}>🗑️</button>
                  </div>
                </td>
              </tr>
            ))}
            {stock.length === 0 && (
              <tr><td colSpan="7"><div className="empty-state"><div className="empty-icon">📦</div><div className="empty-text">Aucun produit en stock</div></div></td></tr>
            )}
          </tbody>
        </table>
      </div>

      {modal && (
        <Modal title={editId ? "✏️ Modifier le produit" : "📦 Ajouter au stock"} onClose={()=>{setModal(false); setEditId(null);}}
          footer={<><button className="btn btn-outline" onClick={()=>{setModal(false); setEditId(null);}}>Annuler</button><button className="btn btn-primary" onClick={enregistrer}>Enregistrer</button></>}>
          <div className="form-grid">
            <div className="form-group">
              <label>Nom du produit *</label>
              <input value={form.produit} onChange={e=>setForm({...form,produit:e.target.value})} placeholder="Ex: Bouillie bordelaise" />
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Catégorie</label>
                <select value={form.categorie} onChange={e=>setForm({...form,categorie:e.target.value})}>
                  <option>Fongicide</option>
                  <option>Insecticide</option>
                  <option>Fertilisant</option>
                  <option>Amendement</option>
                  <option>Autre</option>
                </select>
              </div>
              <div className="form-group">
                <label>Unité</label>
                <select value={form.unite} onChange={e=>setForm({...form,unite:e.target.value})}>
                  <option>kg</option>
                  <option>L</option>
                  <option>g</option>
                  <option>mL</option>
                  <option>unité(s)</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Quantité en stock *</label>
                <input type="number" step="0.1" value={form.quantite} onChange={e=>setForm({...form,quantite:e.target.value})} placeholder="Ex: 25" />

              <div className="form-group">
                <label>Fournisseur</label>
                <input value={form.fournisseur} onChange={e=>setForm({...form,fournisseur:e.target.value})} placeholder="Ex: Coopérative Bio Sud" />
              </div>

                <label>Date d'achat</label>
                <input type="date" value={form.date_achat} onChange={e=>setForm({...form,date_achat:e.target.value})} />
              </div>
            </div>
          </div>
        </Modal>
      )}

      {confirmSuppr && (
        <Modal title="🗑️ Confirmer la suppression" onClose={()=>setConfirmSuppr(null)}
          footer={<><button className="btn btn-outline" onClick={()=>setConfirmSuppr(null)}>Annuler</button><button className="btn btn-danger" onClick={()=>supprimer(confirmSuppr)}>Supprimer</button></>}>
          <p style={{fontSize:'0.9rem'}}>Voulez-vous vraiment supprimer ce produit du stock ? Cette action est irréversible.</p>
        </Modal>
      )}
    </div>
  );
}

function Certification({ certif, setCertif, docsAudit, setDocsAudit }) {

  const audit = new Date(certif.date_prochain_audit);

  const ouvrirEdition = () => {
    setForm({ ...certif, productionsTexte: certif.productions.join(', ') });
    setModal(true);

      ...form,

  const toggleDoc = (id) => {
    setDocsAudit(docsAudit.map(d => d.id === id ? { ...d, fait: !d.fait } : d));

// ===================== CONSEILLER IA =====================
function ConseillerIA() {
  const [messages, setMessages] = useState([
    { role: 'assistant', text: "Bonjour ! Je suis votre conseiller spécialisé en agriculture biologique. Posez-moi vos questions sur la réglementation AB, les intrants autorisés, les périodes de conversion, ou les aides PAC. ⚠️ Mes réponses sont indicatives et ne remplacent pas l'avis de votre organisme certificateur." }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);

  const envoyer = async () => {
    if (!input.trim() || loading) return;
    const question = input.trim();
    setInput('');
    setMessages(prev => [...prev, { role: 'user', text: question }]);
    setLoading(true);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "Tu es un conseiller expert en agriculture biologique française. Tu réponds en français de façon claire, pratique et bienveillante. Tu connais parfaitement le règlement UE 2021/1165, le règlement UE 2018/848, les aides PAC-AB, les organismes certificateurs français (Ecocert, Bureau Veritas, Certipaq, Afocert, Ocacia), et les pratiques agronomiques biologiques. Termine toujours tes réponses par un rappel que tes informations sont indicatives et que l'agriculteur doit consulter son organisme certificateur pour toute décision réglementaire.",
          messages: [{ role: "user", content: question }]
        })
      });
      const data = await response.json();
      const rep = data.content?.[0]?.text || "Je n'ai pas pu obtenir de réponse.";
      setMessages(prev => [...prev, { role: 'assistant', text: rep }]);
    } catch(e) {
      setMessages(prev => [...prev, { role: 'assistant', text: "Erreur de connexion. Vérifiez votre accès internet." }]);
    }
    setLoading(false);
  };

  return (
    <div className="card" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 180px)'}}>
      <div className="card-header">
        <div className="card-title">🤖 Conseiller IA – Agriculture Biologique</div>
        <span className="badge badge-neutre">Bêta</span>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:12}}>
        {messages.map((m,i) => (
          <div key={i} style={{
            display:'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start'
          }}>
            <div style={{
              maxWidth:'75%',
              padding:'12px 16px',
              borderRadius: m.role === 'user' ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
              background: m.role === 'user' ? 'var(--vert-moyen)' : 'var(--creme)',
              color: m.role === 'user' ? 'white' : 'var(--gris-texte)',
              fontSize:'0.875rem',
              lineHeight:1.6,
              border: m.role !== 'user' ? '1px solid var(--gris-clair)' : 'none'
            }}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <div style={{background:'var(--creme)',border:'1px solid var(--gris-clair)',borderRadius:'16px 16px 16px 4px',padding:'12px 16px',color:'#888',fontSize:'0.85rem'}}>
              🌿 Réflexion en cours…
            </div>
          </div>
        )}
      </div>
      <div style={{padding:'16px 24px',borderTop:'1px solid var(--gris-clair)',display:'flex',gap:10}}>
        <input
          style={{flex:1}}
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter' && envoyer()}
          placeholder="Ex: Le cuivre est-il autorisé en AB sur vigne ? Quelle est la dose max ?"
          disabled={loading}
        />
        <button className="btn btn-primary" onClick={envoyer} disabled={loading || !input.trim()}>
          Envoyer
        </button>
      </div>
    </div>
  );
}

const MODULES = [
  { id: 'dashboard', label: 'Tableau de bord', icon: '🏠' },
  { id: 'parcelles', label: 'Mes parcelles', icon: '🗺️' },
  { id: 'intrants', label: 'Registre intrants', icon: '🌿' },

  { id: 'certification', label: 'Certification AB', icon: '🏆' },
  { id: 'aides', label: 'Aides PAC Bio', icon: '💶' },
  { id: 'conseiller', label: 'Conseiller IA', icon: '🤖' },
];

function EcranMotDePasse({ onAcces }) {
  const [mdp, setMdp] = React.useState('');
  const [erreur, setErreur] = React.useState('');
  const verifier = () => {
    if (mdp.trim() === 'DEMO2025') { onAcces(); }
    else { setErreur('Code incorrect. Veuillez réessayer.'); setMdp(''); }
  };
  return (
    <div className="pwd-screen">
      <div className="pwd-card">
        <div className="pwd-logo">Facil<span>Bio</span></div>
        <div className="pwd-subtitle">Version Démo – Accès restreint</div>
        <div className="demo-warning-pwd">
          <strong>⚠️ DÉMO EN COURS DE TEST</strong><br/>
          Cette application est une version de démonstration non finalisée.<br/><br/>
          Les données saisies ne sont pas sauvegardées. Facil'Gestion31 <strong>décline toute responsabilité</strong> quant à l'utilisation des informations présentées. Les données réglementaires sont fournies à titre indicatif uniquement.
        </div>
        <div className="pwd-input-wrap">
          <input
            type="password"
            placeholder="Code d'accès"
            value={mdp}
            onChange={e => { setMdp(e.target.value); setErreur(''); }}
            onKeyDown={e => e.key === 'Enter' && verifier()}
            autoFocus
          />
        </div>
        <div className="pwd-error">{erreur}</div>
        <button className="pwd-btn" onClick={verifier}>Accéder à la démo →</button>
        <div className="pwd-footer">
          Facil'Gestion31 · Application en développement<br/>
          Contactez cendrine@facilgestion31.fr pour un accès testeur
        </div>
      </div>
    </div>
  );
}

  if (!accesAutorise) return <EcranMotDePasse onAcces={() => setAccesAutorise(true)} />;

  return (

      <aside className="sidebar">

        </div>
        <nav className="nav-section">
          <div className="nav-label">Navigation</div>

            <div key={m.id} className={`nav-item ${module===m.id?'active':''}`} onClick={()=>setModule(m.id)}>

      <main className="main">
        <div className="topbar">
          <div className="page-title">{titres[module]}</div>
          <div className="topbar-right">
            <span className="badge badge-ab">🌿 Mode Agriculture Biologique</span>
          </div>

        <div className="content">
